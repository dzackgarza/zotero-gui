# Repo-owned configuration: edit triggers (cron, branches) and `with:` values
# directly. All review behavior lives upstream in the referenced workflow.
name: General Review

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'
  push:
    branches: [main]

jobs:
  general:
    uses: dzackgarza/ai-review-ci/.github/workflows/_review.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    with:
      report_type: general
      scope: repo
      fail_below: ${{ vars.GENERAL_FAIL_BELOW }}
